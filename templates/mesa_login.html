{% extends "base.html" %}
{% block content %}
<p class="eyebrow">Acceso de mesa</p>
<form method="post">
  <label for="table_id">Selecciona tu mesa</label>
  <select name="table_id" id="table_id">
    {% for table in tables %}
      <option value="{{ table.id }}">{{ table.name }} - {{ table.topic }}</option>
    {% endfor %}
  </select>

  <label for="passcode">Código de acceso</label>
  <input type="text" name="passcode" id="passcode" placeholder="0000" maxlength="4">

  <button type="submit" class="btn btn-primary">Ingresar</button>
</form>
<a class="btn btn-secondary" href="{{ url_for('landing') }}">Volver</a>
{% endblock %}
