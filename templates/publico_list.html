{% extends "base.html" %}
{% block content %}
<p class="eyebrow">Vista pública - toca una mesa</p>
{% for table in tables %}
  <a class="table-card" href="{{ url_for('publico_detail', table_id=table.id) }}">
    <div class="table-card-name">{{ table.name }}</div>
    <div class="table-card-topic">{{ table.topic }}</div>
  </a>
{% else %}
  <p class="muted">Aún no hay mesas registradas.</p>
{% endfor %}
<a class="btn btn-secondary" href="{{ url_for('landing') }}">Volver</a>
{% endblock %}
